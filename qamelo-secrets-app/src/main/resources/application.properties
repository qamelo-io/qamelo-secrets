# Qamelo Secrets — Secret Broker Service
quarkus.http.port=9002
quarkus.http.auth.proactive=false

# Vault connection
qamelo.vault.url=${QAMELO_VAULT_URL:http://vault.qamelo-system:8200}
qamelo.vault.auth.method=${QAMELO_VAULT_AUTH_METHOD:kubernetes}
qamelo.vault.auth.kubernetes.role=${QAMELO_VAULT_AUTH_ROLE:qamelo-secrets}
qamelo.vault.auth.token=${QAMELO_VAULT_TOKEN:}

# Engine mount paths (defaults match Vault conventions)
qamelo.vault.mount.kv=${QAMELO_VAULT_MOUNT_KV:kv}
qamelo.vault.mount.pki=${QAMELO_VAULT_MOUNT_PKI:pki}
qamelo.vault.mount.transit=${QAMELO_VAULT_MOUNT_TRANSIT:transit}
qamelo.vault.mount.ssh=${QAMELO_VAULT_MOUNT_SSH:ssh}
qamelo.vault.mount.database=${QAMELO_VAULT_MOUNT_DATABASE:database}

# Logging
quarkus.log.console.json=true
quarkus.log.category."io.qamelo.secrets.audit".level=INFO

# Dev profile
%dev.qamelo.vault.url=http://localhost:8200
%dev.qamelo.vault.auth.method=token
%dev.qamelo.vault.auth.token=root
%dev.quarkus.log.console.json=false
%dev.quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

# Test profile
%test.quarkus.log.console.json=false
%test.quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
%test.quarkus.log.level=INFO
%test.quarkus.log.category."io.qamelo".level=DEBUG

# mTLS — internal service-to-service authentication
quarkus.http.ssl.client-auth=request
quarkus.tls.key-store.pem.0.cert=/etc/qamelo/tls/tls.crt
quarkus.tls.key-store.pem.0.key=/etc/qamelo/tls/tls.key
quarkus.tls.trust-store.pem.certs=/etc/qamelo/tls/ca.crt
